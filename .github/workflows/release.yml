name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows"
            platform: "windows-latest"
            args: ""
          - name: "Linux"
            # 24.04 ships libmpv2 (libmpv.so.2), which the embedded player links
            # against (ADR 0008); 22.04 only has libmpv1.
            platform: "ubuntu-24.04"
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libmpv-dev

      # ffmpeg/ffprobe are bundled as Tauri sidecars but not committed (see
      # src-tauri/binaries/README.md); fetch a self-contained build for this
      # runner's host triple. Runs under bash on Windows too (git-bash).
      - name: Fetch ffmpeg/ffprobe sidecars
        shell: bash
        run: bash scripts/fetch-sidecars.sh

      # The embedded player links libmpv-2.dll via raw-dylib (ADR 0014); the
      # DLL ships beside the exe as a bundle resource and is fetched, not
      # committed. Linux instead links the system libmpv (libmpv-dev above).
      - name: Fetch libmpv (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/fetch-libmpv.sh

      - name: Install frontend dependencies
        run: bun install

      - name: Build and publish
        id: tauri
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push, publish the release under the pushed tag itself
          # (github.ref_name, e.g. v1.4.0) so it matches the tag version rather
          # than the app version baked into tauri.conf.json. workflow_dispatch
          # has no tag, so fall back to the tauri-action v__VERSION__ placeholder.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v__VERSION__' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v__VERSION__' }}
          releaseBody: See the assets to download this version.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          retryAttempts: 2
          args: ${{ matrix.args }}
          assetNamePattern: "[name]-[version]-[platform]-[arch][ext]"
          includeUpdaterJson: false

      # linuxdeploy bundles libmpv's audio deps (pipewire/pulse/jack) into the
      # AppImage, which collide with the host's at runtime (ADR 0008). Strip them
      # and replace the asset tauri-action just uploaded.
      - name: Fix AppImage audio libs and re-upload
        if: startsWith(matrix.platform, 'ubuntu') && steps.tauri.outputs.releaseId != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
        run: |
          set -euo pipefail
          fixed="$(bash scripts/fix-appimage.sh)"
          tag="$(gh api "repos/$REPO/releases/$RELEASE_ID" -q .tag_name)"
          asset="$(gh api "repos/$REPO/releases/$RELEASE_ID/assets" \
            -q '.[] | select(.name | endswith(".AppImage")) | .name')"
          cp "$fixed" "$RUNNER_TEMP/$asset"
          gh release upload "$tag" "$RUNNER_TEMP/$asset" --clobber --repo "$REPO"

      - name: Release summary
        if: steps.tauri.outputs.releaseHtmlUrl != ''
        shell: bash
        # Pass values via env, not ${{ }} interpolation: artifactPaths is JSON
        # with embedded quotes/backslashes that would break the shell (and is an
        # injection vector) if spliced directly into the script.
        env:
          PLATFORM: ${{ matrix.name }}
          APP_VERSION: ${{ steps.tauri.outputs.appVersion }}
          RELEASE_URL: ${{ steps.tauri.outputs.releaseHtmlUrl }}
          ARTIFACTS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          {
            echo "## Tauri Release"
            echo ""
            echo "- Platform: \`$PLATFORM\`"
            echo "- Version: \`$APP_VERSION\`"
            echo "- Release: $RELEASE_URL"
            echo "- Artifacts: \`$ARTIFACTS\`"
          } >> "$GITHUB_STEP_SUMMARY"
